version: 2
project_name: augur

before:
  hooks:
    - rm -rf internal/rules/policy
    - mkdir -p internal/rules/policy
    - cp -R policy/main policy/lib internal/rules/policy/
    - go mod tidy

builds:
  - id: augur
    main: ./cmd/augur
    binary: augur
    env: [CGO_ENABLED=0]
    ldflags: [-s, -w, "-X main.version={{.Version}}"]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files: [README.md, "policy/**/*.rego"]

kos:
  - id: augur
    main: ./cmd/augur
    repositories:
      - ghcr.io/starkross/augur
    platforms: [linux/amd64, linux/arm64]
    tags:
      - "{{ .Version }}"
      - '{{ if not .Prerelease }}latest{{ end }}'
    bare: true
    sbom: cyclonedx
    ldflags: [-s, -w, "-X main.version={{.Version}}"]
    labels:
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.source: "{{ .GitURL }}"
      org.opencontainers.image.licenses: Apache-2.0

homebrew_casks:
  - repository:
      owner: starkross
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: https://github.com/starkross/augur
    description: Policy-driven linter for OpenTelemetry configurations
    license: Apache-2.0
    skip_upload: auto

release:
  prerelease: auto

checksum:
  name_template: checksums.txt

sboms:
  - id: archive
    artifacts: archive
    documents:
      - "${artifact}.sbom.cdx.json"
    cmd: syft
    args: [scan, "$artifact", --output, "cyclonedx-json=$document"]

signs:
  - id: checksums
    cmd: cosign
    certificate: "${artifact}.pem"
    signature: "${artifact}.sig"
    args:
      - sign-blob
      - "--yes"
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
    artifacts: checksum
    output: true

docker_signs:
  - id: images
    cmd: cosign
    args:
      - sign
      - "--yes"
      - "${artifact}"
    artifacts: manifests
    output: true

nfpms:
  - package_name: augur
    maintainer: starkross
    vendor: starkross
    license: Apache-2.0
    formats: [deb, rpm, apk]
    contents:
      - src: policy/**/*.rego
        dst: /usr/share/augur/policy/
