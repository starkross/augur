version: 2
project_name: augur

before:
  hooks:
    - rm -rf internal/rules/policy
    - mkdir -p internal/rules/policy
    - cp -R policy/main policy/lib internal/rules/policy/
    - go mod tidy

builds:
  - id: augur
    main: ./cmd/augur
    binary: augur
    env: [CGO_ENABLED=0]
    ldflags: [-s, -w, "-X main.version={{.Version}}"]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files: [README.md, "policy/**/*.rego"]

checksum:
  name_template: checksums.txt

brews:
  - repository:
      owner: starkross
      name: homebrew-tap
    name: augur
    homepage: https://github.com/starkross/augur
    description: Best-practices linter for OpenTelemetry Collector configs

nfpms:
  - package_name: augur
    vendor: starkross
    license: Apache-2.0
    formats: [deb, rpm, apk]
    contents:
      - src: policy/**/*.rego
        dst: /usr/share/augur/policy/
