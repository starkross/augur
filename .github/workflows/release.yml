name: Release
on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write # cosign keyless OIDC + SLSA provenance

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: ko-build/setup-ko@d006021bd0c28d1ce33a07e7943d48b079944c8d # v0.9
      - uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - name: Compute artifact hashes for SLSA provenance
        id: hash
        working-directory: dist
        run: |
          set -euo pipefail
          shopt -s nullglob
          subjects=(*.tar.gz *.zip *.deb *.rpm *.apk *.sbom.cdx.json checksums.txt)
          if [ ${#subjects[@]} -eq 0 ]; then
            echo "no release artifacts found in dist/" >&2
            exit 1
          fi
          echo "hashes=$(sha256sum -- "${subjects[@]}" | base64 -w0)" >> "$GITHUB_OUTPUT"

  # SLSA Level 3 build provenance for binary release artifacts.
  # Reusable workflow MUST be referenced by tag (not commit SHA): the generator
  # verifies its own ref and rejects unpinned references at runtime.
  provenance:
    needs: [release]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.release.outputs.hashes }}"
      upload-assets: true

  verify:
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            method: archive
          - runner: ubuntu-latest
            method: deb
          - runner: ubuntu-latest
            method: rpm
          - runner: ubuntu-latest
            method: apk
          - runner: ubuntu-latest
            method: docker
          - runner: macos-latest
            method: homebrew
          - runner: ubuntu-latest
            method: go-install
          - runner: ubuntu-latest
            method: cosign-checksums
          - runner: ubuntu-latest
            method: cosign-image
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    steps:
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install from tar.gz archive
        if: matrix.method == 'archive'
        run: |
          curl -fsSL "https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/augur_${{ steps.version.outputs.version }}_linux_amd64.tar.gz" -o augur.tar.gz
          tar xzf augur.tar.gz
          ./augur --version

      - name: Install from deb package
        if: matrix.method == 'deb'
        run: |
          curl -fsSL "https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/augur_${{ steps.version.outputs.version }}_linux_amd64.deb" -o augur.deb
          sudo dpkg -i augur.deb
          augur --version

      - name: Install from rpm package
        if: matrix.method == 'rpm'
        run: |
          curl -fsSL "https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/augur_${{ steps.version.outputs.version }}_linux_amd64.rpm" -o augur.rpm
          sudo rpm -i augur.rpm
          augur --version

      - name: Install from apk package
        if: matrix.method == 'apk'
        run: |
          docker run --rm -v "$PWD:/work" alpine sh -c "
            apk add --no-cache curl &&
            curl -fsSL 'https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/augur_${{ steps.version.outputs.version }}_linux_amd64.apk' -o /tmp/augur.apk &&
            apk add --allow-untrusted /tmp/augur.apk &&
            augur --version
          "

      - name: Install from Docker image
        if: matrix.method == 'docker'
        run: |
          docker pull ghcr.io/starkross/augur:${{ steps.version.outputs.version }}
          docker run --rm ghcr.io/starkross/augur:${{ steps.version.outputs.version }} --version

      - name: Set up Go
        if: matrix.method == 'go-install'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"

      - name: Install via go install
        if: matrix.method == 'go-install'
        run: |
          go install github.com/${{ github.repository }}/cmd/augur@${GITHUB_REF_NAME}
          augur --version

      - name: Install from Homebrew
        if: matrix.method == 'homebrew' && !contains(github.ref_name, '-')
        run: |
          brew install --cask starkross/tap/augur
          augur --version

      - name: Skip Homebrew verify on pre-release
        if: matrix.method == 'homebrew' && contains(github.ref_name, '-')
        run: echo "Skipping Homebrew verify for pre-release ${GITHUB_REF_NAME} (tap is not updated for pre-releases by design)."

      - name: Install cosign
        if: startsWith(matrix.method, 'cosign-')
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Verify checksums.txt cosign signature
        if: matrix.method == 'cosign-checksums'
        env:
          IDENTITY_REGEX: https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/tags/v.*
          OIDC_ISSUER: https://token.actions.githubusercontent.com
        run: |
          set -euo pipefail
          base="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}"
          curl -fsSL "${base}/checksums.txt"     -o checksums.txt
          curl -fsSL "${base}/checksums.txt.sig" -o checksums.txt.sig
          curl -fsSL "${base}/checksums.txt.pem" -o checksums.txt.pem
          cosign verify-blob \
            --certificate checksums.txt.pem \
            --signature   checksums.txt.sig \
            --certificate-identity-regexp "${IDENTITY_REGEX}" \
            --certificate-oidc-issuer     "${OIDC_ISSUER}" \
            checksums.txt

      - name: Verify container image cosign signature
        if: matrix.method == 'cosign-image'
        env:
          IDENTITY_REGEX: https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/tags/v.*
          OIDC_ISSUER: https://token.actions.githubusercontent.com
        run: |
          set -euo pipefail
          cosign verify "ghcr.io/starkross/augur:${{ steps.version.outputs.version }}" \
            --certificate-identity-regexp "${IDENTITY_REGEX}" \
            --certificate-oidc-issuer     "${OIDC_ISSUER}"

      - name: Verify version output
        run: echo "Successfully installed augur ${{ steps.version.outputs.version }} via ${{ matrix.method }}"
